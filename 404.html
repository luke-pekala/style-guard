<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>404 — StyleGuard Pro</title>
<meta name="robots" content="noindex">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
[data-theme="dark"]{--bg:#0c0c0d;--border:#222225;--text:#e8e6e1;--text-mid:#7a7880;--text-dim:#383640;--accent:#f0c040}
body{font-family:'JetBrains Mono',monospace;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;padding:32px;text-align:center}
.code{font-size:5rem;font-weight:300;line-height:1;color:var(--accent)}
.msg{font-size:.78rem;color:var(--text-mid);letter-spacing:.08em}
.back{font-size:.7rem;color:var(--text-dim);text-decoration:none;border:1px solid var(--border);padding:6px 16px;margin-top:8px;transition:all .15s}
.back:hover{color:var(--text);border-color:#2e2e33}
</style>
</head>
<body>
  <div class="code">404</div>
  <div class="msg">Page not found</div>
  <a class="back" href="/">← Back to StyleGuard Pro</a>
</body>
</html>
